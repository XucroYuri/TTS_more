name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (pytest, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e 'backend[dev]'
      - name: Run pytest
        env:
          # The suite must pass without network egress; proxy vars break httpx.
          ALL_PROXY: ""
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
        run: pytest backend -q

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Run vitest
        run: pnpm test
        working-directory: frontend
      - name: Build
        run: pnpm build
        working-directory: frontend
