name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (pytest, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e 'backend[dev]'
      - name: Run pytest
        env:
          # The suite must pass without network egress; proxy vars break httpx.
          ALL_PROXY: ""
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
        run: pytest backend -q
      - name: Native Windows deployment validation
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $requiredShells = @("powershell.exe", "pwsh.exe")
          foreach ($shell in $requiredShells) {
            if (-not (Get-Command $shell -ErrorAction SilentlyContinue)) {
              throw "Required native deployment shell is missing: $shell"
            }
          }
          python -m pytest `
            "backend/tests/test_deploy_tool.py::test_windows_native_powershell_launchers_reject_unsafe_remote" `
            "backend/tests/test_deploy_tool.py::test_windows_native_drive_junction_and_gitdir_policy" `
            "backend/tests/test_prepare_scripts.py::test_windows_native_prepare_and_wrapper_fail_without_supported_conda" `
            -q

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Run vitest
        run: pnpm test
        working-directory: frontend
      - name: Build
        run: pnpm build
        working-directory: frontend
