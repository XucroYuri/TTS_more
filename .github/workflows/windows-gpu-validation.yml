name: Windows GPU validation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: CUDA validation mode
        required: true
        default: single-release
        type: choice
        options:
          - single-clean
          - single-release
          - distributed
      topology:
        description: Runner-local topology manifest path (or configure TTS_MORE_CUDA_TOPOLOGY as a repository variable)
        required: false
        type: string
      fixture:
        description: Runner-local validation fixture path (or configure TTS_MORE_CUDA_FIXTURE as a repository variable)
        required: false
        type: string
      require_baseline:
        description: Require an approved performance baseline; disable only for first certification
        required: true
        default: true
        type: boolean
  release:
    types: [prereleased, published]

concurrency:
  group: windows-gpu-validation-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  TTS_MORE_CUDA_TOPOLOGY: ${{ inputs.topology || vars.TTS_MORE_CUDA_TOPOLOGY }}
  TTS_MORE_CUDA_FIXTURE: ${{ inputs.fixture || vars.TTS_MORE_CUDA_FIXTURE }}
  TTS_MORE_E2E_BASE_URL: http://127.0.0.1:5173
  TTS_MORE_API_TARGET: http://127.0.0.1:8000
  TTS_MORE_SERVICE_MODE: real
  TTS_MORE_API_TOKEN: ${{ secrets.TTS_MORE_API_TOKEN }}
  TTS_MORE_VALIDATION_SSH_USER: ${{ vars.TTS_MORE_VALIDATION_SSH_USER }}
  TTS_MORE_VALIDATION_REMOTE_ROOT: ${{ vars.TTS_MORE_VALIDATION_REMOTE_ROOT }}
  TTS_MORE_REQUIRE_BASELINE: ${{ github.event_name == 'release' || inputs.require_baseline }}

jobs:
  single-validation:
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && inputs.mode != 'distributed') ||
        github.event_name == 'release'
      }}
    runs-on: [self-hosted, Windows, X64, cuda, tts-more-gpu]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install control-plane and browser dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          & .\.venv\Scripts\python.exe -m pip install --upgrade pip
          & .\.venv\Scripts\python.exe -m pip install -e 'backend[dev]'
          & .\.venv\Scripts\python.exe -m pip install faster-whisper
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend cuda:e2e:install

      - name: Validate local runner inputs
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TTS_MORE_CUDA_TOPOLOGY)) { throw "CUDA topology path is not configured" }
          if ([string]::IsNullOrWhiteSpace($env:TTS_MORE_CUDA_FIXTURE)) { throw "CUDA fixture path is not configured" }

      - name: Run CUDA validator
        shell: pwsh
        env:
          VALIDATION_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'single-release' }}
        run: |
          $validationParameters = @{
            Mode = $env:VALIDATION_MODE
            Topology = $env:TTS_MORE_CUDA_TOPOLOGY
            Fixture = $env:TTS_MORE_CUDA_FIXTURE
            Output = "artifacts\cuda-single"
          }
          if ($env:TTS_MORE_REQUIRE_BASELINE -eq "true") { $validationParameters.RequireBaseline = $true }
          & ./scripts/run-cuda-validation.ps1 @validationParameters

      - name: Run CUDA workstation Playwright loop
        shell: pwsh
        env:
          TTS_MORE_RUN_CUDA_E2E: "1"
          TTS_MORE_CUDA_VALIDATION_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'single-release' }}
        run: |
          New-Item -ItemType Directory -Force artifacts\cuda-single\logs | Out-Null
          $backend = Start-Process `
            -FilePath .\.venv\Scripts\python.exe `
            -ArgumentList '-m','uvicorn','app.main:app','--app-dir','backend','--host','127.0.0.1','--port','8000' `
            -RedirectStandardOutput artifacts\cuda-single\logs\app-backend.stdout.log `
            -RedirectStandardError artifacts\cuda-single\logs\app-backend.stderr.log `
            -PassThru
          try {
            $ready = $false
            $healthHeaders = @{}
            if (![string]::IsNullOrWhiteSpace($env:TTS_MORE_API_TOKEN)) {
              $healthHeaders.Authorization = "Bearer $env:TTS_MORE_API_TOKEN"
            }
            for ($attempt = 0; $attempt -lt 60; $attempt += 1) {
              try {
                $response = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8000/api/health -Headers $healthHeaders -TimeoutSec 5
                if ($response.StatusCode -eq 200) { $ready = $true; break }
              } catch { Start-Sleep -Seconds 2 }
            }
            if (!$ready) { throw "TTS More backend did not become ready" }
            Push-Location frontend
            try {
              pnpm cuda:e2e
              if ($LASTEXITCODE -ne 0) { throw "Playwright CUDA E2E failed" }
            } finally { Pop-Location }
          } finally {
            if ($backend -and !$backend.HasExited) { Stop-Process -Id $backend.Id -Force }
          }

      - name: Upload single-node validation evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-gpu-single-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/cuda-single/summary.json
            artifacts/cuda-single/junit.xml
            artifacts/cuda-single/wav/**
            artifacts/cuda-single/logs/**
            artifacts/cuda-single/controller.log
            artifacts/cuda-single/worker-log-references.json
            artifacts/cuda-single/nvidia-smi.csv
            artifacts/cuda-single/human-listening-review.md
            artifacts/cuda-single/orchestration-preflight.json
            frontend/test-results/**

  distributed-validation:
    needs: single-validation
    if: >-
      ${{
        always() &&
        ((github.event_name == 'workflow_dispatch' && inputs.mode == 'distributed') ||
          (github.event_name == 'release' && github.event.action == 'published' && github.event.release.prerelease == false))
      }}
    runs-on: [self-hosted, Windows, X64, cuda, tts-more-gpu]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install control-plane and browser dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          & .\.venv\Scripts\python.exe -m pip install --upgrade pip
          & .\.venv\Scripts\python.exe -m pip install -e 'backend[dev]'
          & .\.venv\Scripts\python.exe -m pip install faster-whisper
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend cuda:e2e:install

      - name: Validate distributed runner inputs
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TTS_MORE_CUDA_TOPOLOGY)) { throw "CUDA topology path is not configured" }
          if ([string]::IsNullOrWhiteSpace($env:TTS_MORE_CUDA_FIXTURE)) { throw "CUDA fixture path is not configured" }

      - name: Run distributed CUDA validator
        shell: pwsh
        run: |
          $validationParameters = @{
            Mode = "distributed"
            Topology = $env:TTS_MORE_CUDA_TOPOLOGY
            Fixture = $env:TTS_MORE_CUDA_FIXTURE
            Output = "artifacts\cuda-distributed"
          }
          if ($env:TTS_MORE_REQUIRE_BASELINE -eq "true") { $validationParameters.RequireBaseline = $true }
          & ./scripts/run-cuda-validation.ps1 @validationParameters

      - name: Run distributed workstation Playwright loop
        shell: pwsh
        env:
          TTS_MORE_RUN_CUDA_E2E: "1"
          TTS_MORE_CUDA_VALIDATION_MODE: distributed
        run: |
          New-Item -ItemType Directory -Force artifacts\cuda-distributed\logs | Out-Null
          $backend = Start-Process `
            -FilePath .\.venv\Scripts\python.exe `
            -ArgumentList '-m','uvicorn','app.main:app','--app-dir','backend','--host','127.0.0.1','--port','8000' `
            -RedirectStandardOutput artifacts\cuda-distributed\logs\app-backend.stdout.log `
            -RedirectStandardError artifacts\cuda-distributed\logs\app-backend.stderr.log `
            -PassThru
          try {
            $ready = $false
            $healthHeaders = @{}
            if (![string]::IsNullOrWhiteSpace($env:TTS_MORE_API_TOKEN)) {
              $healthHeaders.Authorization = "Bearer $env:TTS_MORE_API_TOKEN"
            }
            for ($attempt = 0; $attempt -lt 60; $attempt += 1) {
              try {
                $response = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8000/api/health -Headers $healthHeaders -TimeoutSec 5
                if ($response.StatusCode -eq 200) { $ready = $true; break }
              } catch { Start-Sleep -Seconds 2 }
            }
            if (!$ready) { throw "TTS More backend did not become ready" }
            Push-Location frontend
            try {
              pnpm cuda:e2e
              if ($LASTEXITCODE -ne 0) { throw "Playwright CUDA E2E failed" }
            } finally { Pop-Location }
          } finally {
            if ($backend -and !$backend.HasExited) { Stop-Process -Id $backend.Id -Force }
          }

      - name: Upload distributed validation evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-gpu-distributed-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/cuda-distributed/summary.json
            artifacts/cuda-distributed/junit.xml
            artifacts/cuda-distributed/wav/**
            artifacts/cuda-distributed/logs/**
            artifacts/cuda-distributed/controller.log
            artifacts/cuda-distributed/worker-log-references.json
            artifacts/cuda-distributed/nvidia-smi.csv
            artifacts/cuda-distributed/human-listening-review.md
            artifacts/cuda-distributed/orchestration-preflight.json
            artifacts/cuda-distributed/fault-recovery.json
            artifacts/cuda-distributed/recovery/**
            artifacts/cuda-distributed/worker-logs/**
            artifacts/cuda-distributed/distributed-evidence.json
            frontend/test-results/**

  stable-release-gate:
    needs: [single-validation, distributed-validation]
    if: ${{ always() && github.event_name == 'release' && github.event.action == 'published' && github.event.release.prerelease == false }}
    runs-on: [self-hosted, Windows, X64, cuda, tts-more-gpu]
    timeout-minutes: 10
    steps:
      - name: Require both stable-release CUDA validations
        shell: pwsh
        run: |
          if ('${{ needs.single-validation.result }}' -ne 'success') { throw "Single-node CUDA validation did not pass" }
          if ('${{ needs.distributed-validation.result }}' -ne 'success') { throw "Distributed CUDA validation did not pass" }
