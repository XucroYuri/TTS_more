name: Windows portable package

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Portable package version
        required: true
        default: 0.2.0

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install frozen uv tool
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Check immutable locks
        shell: pwsh
        run: |
          uv lock --check --project backend
          uv sync --locked --project backend --extra dev
          $testPython = (Resolve-Path backend\.venv\Scripts\python.exe).Path
          & $testPython -m pytest backend/tests/test_portable_install.py backend/tests/test_portable_launcher.py backend/tests/test_portable_diagnostics.py backend/tests/test_portable_packages.py backend/tests/test_portable_locks.py backend/tests/test_portable_discovery.py backend/tests/test_integration_sync.py -q
      - name: Build static frontend
        shell: pwsh
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend test
          pnpm --dir frontend build
      - name: Build and audit bootstrap ZIP
        shell: pwsh
        run: |
          $buildPython = (Resolve-Path backend\.venv\Scripts\python.exe).Path
          $env:TTS_MORE_BUILD_PYTHON = $buildPython
          $version = $env:PACKAGE_VERSION -replace '^v', ''
          $version = $version -replace '[^0-9A-Za-z._-]', '-'
          .\Build-Package.ps1 -Profile Bootstrap -Device CPU -Version $version
          $candidateZips = @(Get-ChildItem artifacts\portable\bootstrap\*.zip)
          if ($candidateZips.Count -ne 1) { throw "expected exactly one bootstrap ZIP" }
          foreach ($candidateZip in $candidateZips) {
            & $buildPython scripts\portable_packages.py audit-release --zip $candidateZip.FullName
            if ($LASTEXITCODE -ne 0) { throw "bootstrap ZIP release audit failed" }
          }
          & $buildPython scripts\portable_packages.py audit-release-assets --directory artifacts\portable\bootstrap --expected-component tts-more --expected-version $version
          if ($LASTEXITCODE -ne 0) { throw "bootstrap release asset set or embedded package_profile audit failed" }
          $zip = Get-Item -LiteralPath (Join-Path "artifacts\portable\bootstrap" "TTS-More-$version-windows-x64-bootstrap.zip")
          $expanded = Join-Path $env:RUNNER_TEMP "tts-more-bootstrap-audit"
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $expanded
          $packageRoot = @(Get-ChildItem -LiteralPath $expanded -Directory)
          if ($packageRoot.Count -ne 1) { throw "expected exactly one package root" }
          & $buildPython (Join-Path $packageRoot[0].FullName "scripts\portable_packages.py") verify-sha256 --package-root $packageRoot[0].FullName
          $exporters = @(Get-ChildItem -LiteralPath $packageRoot[0].FullName -Recurse -File -Filter "export-portable-diagnostics.py")
          if ($exporters.Count -ne 1) { throw "expected exactly one diagnostic exporter" }
          $diagnosticZip = Join-Path $packageRoot[0].FullName "data\local\diagnostics\ci-diagnostics.zip"
          & $buildPython $exporters[0].FullName --package-root $packageRoot[0].FullName --output $diagnosticZip
          $env:PORTABLE_DIAGNOSTIC_ZIP = $diagnosticZip
          @'
          import json, os, zipfile
          from pathlib import Path
          path = Path(os.environ["PORTABLE_DIAGNOSTIC_ZIP"])
          with zipfile.ZipFile(path) as archive:
              if archive.namelist() != ["diagnostics/report.json"]:
                  raise SystemExit(f"unexpected diagnostic entries: {archive.namelist()}")
              report = archive.read("diagnostics/report.json").decode("utf-8")
          for value in (os.environ.get("USERPROFILE"), os.environ.get("USERNAME"), os.environ.get("COMPUTERNAME")):
              if value and len(value) >= 4 and value.casefold() in report.casefold():
                  raise SystemExit("diagnostic report leaked machine identity")
          payload = json.loads(report)
          if payload.get("schema_version") != 1:
              raise SystemExit("diagnostic schema gate failed")
          print("DIAGNOSTIC_AUDIT_OK")
          '@ | & $buildPython -
      - name: Prove full-profile upload is refused
        shell: pwsh
        run: |
          $buildPython = (Resolve-Path backend\.venv\Scripts\python.exe).Path
          @'
          import json, zipfile
          with zipfile.ZipFile("artifacts/portable/forbidden-full.zip", "w") as archive:
              archive.writestr("Component/package/tts-more-package.json", json.dumps({"schema_version": 2, "component": "tts-more", "package_profile": "full"}))
          '@ | & $buildPython -
          @'
          from pathlib import Path
          from scripts.portable_packages import audit_release_zip
          report = audit_release_zip(Path("artifacts/portable/forbidden-full.zip"))
          if report["valid"] or not any("profile=full" in error for error in report["errors"]):
              raise SystemExit("full profile release audit unexpectedly passed")
          print("EXPECTED_FULL_REJECTION")
          '@ | & $buildPython -
          Remove-Item artifacts\portable\forbidden-full.zip
      - uses: actions/upload-artifact@v7
        with:
          name: tts-more-windows-bootstrap
          if-no-files-found: error
          path: |
            artifacts/portable/bootstrap/*.zip
            artifacts/portable/bootstrap/*.sha256
            artifacts/portable/bootstrap/*.spdx.json
            artifacts/portable/bootstrap/*.licenses.json
            artifacts/portable/bootstrap/*.provenance.json
            artifacts/portable/bootstrap/*.acceptance.json

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: bootstrap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install frozen uv tool
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
      - uses: actions/download-artifact@v8
        with:
          name: tts-more-windows-bootstrap
          path: release-assets
      - name: Publish bootstrap assets only
        env:
          GH_TOKEN: ${{ github.token }}
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/tts-more-build-tools
        run: |
          uv sync --locked --project integrations/build_tools
          build_python="$RUNNER_TEMP/tts-more-build-tools/bin/python"
          if [ ! -x "$build_python" ]; then
            echo "locked portable build-tools Python is missing" >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          found_zip=false
          for candidate_zip in release-assets/*.zip; do
            [ -e "$candidate_zip" ] || continue
            found_zip=true
            "$build_python" scripts/portable_packages.py audit-release --zip "$candidate_zip"
          done
          if [ "$found_zip" != true ]; then
            echo "no Bootstrap ZIP was downloaded" >&2
            exit 1
          fi
          "$build_python" scripts/portable_packages.py audit-release-assets --directory release-assets --expected-component tts-more --expected-version "$version"
          shopt -s nullglob
          assets=(
            release-assets/*.zip
            release-assets/*.zip.sha256
            release-assets/*.zip.spdx.json
            release-assets/*.zip.licenses.json
            release-assets/*.zip.provenance.json
            release-assets/*.zip.acceptance.json
          )
          mapfile -t local_asset_names < <(printf '%s\n' "${assets[@]##*/}" | LC_ALL=C sort -u)
          if [ "${#local_asset_names[@]}" -ne 6 ]; then
            echo "local Bootstrap release allowlist must contain exactly six assets" >&2
            exit 1
          fi
          remote_asset_names=()
          release_exists=false
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            release_exists=true
            mapfile -t remote_asset_names < <(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name' | LC_ALL=C sort -u)
            unexpected_remote="$(comm -23 <(printf '%s\n' "${remote_asset_names[@]}") <(printf '%s\n' "${local_asset_names[@]}"))"
            if [ -n "$unexpected_remote" ]; then
              echo "existing GitHub Release has foreign, Full, old-version, or extra assets:" >&2
              printf '%s\n' "$unexpected_remote" >&2
              exit 1
            fi
          fi
          mapfile -t post_upload_union < <(printf '%s\n' "${local_asset_names[@]}" "${remote_asset_names[@]}" | LC_ALL=C sort -u)
          if ! diff -u <(printf '%s\n' "${local_asset_names[@]}") <(printf '%s\n' "${post_upload_union[@]}"); then
            echo "GitHub Release asset union would exceed the exact local six-asset allowlist" >&2
            exit 1
          fi
          if [ "$release_exists" != true ]; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          verify_asset_args=()
          for asset_name in "${local_asset_names[@]}"; do
            verify_asset_args+=(--expected-name "$asset_name")
          done
          "$build_python" scripts/verify-release-asset-set.py \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            "${verify_asset_args[@]}"
