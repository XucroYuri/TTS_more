name: Windows portable package

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Portable package version
        required: true
        default: 0.2.0

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install frozen uv tool
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Check immutable locks
        shell: pwsh
        run: |
          uv lock --check --project backend
          python -m pip install -e "backend[dev]"
          python -m pytest backend/tests/test_portable_install.py backend/tests/test_portable_launcher.py backend/tests/test_portable_packages.py backend/tests/test_portable_locks.py backend/tests/test_portable_discovery.py backend/tests/test_integration_sync.py -q
      - name: Build static frontend
        shell: pwsh
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend test
          pnpm --dir frontend build
      - name: Build and audit bootstrap ZIP
        shell: pwsh
        env:
          TTS_MORE_BUILD_PYTHON: python
        run: |
          $version = $env:PACKAGE_VERSION -replace '^v', ''
          $version = $version -replace '[^0-9A-Za-z._-]', '-'
          .\Build-Package.ps1 -Profile Bootstrap -Device CPU -Version $version
          $zip = @(Get-ChildItem artifacts\portable\bootstrap\*.zip)
          if ($zip.Count -ne 1) { throw "expected exactly one bootstrap ZIP" }
          python scripts\portable_packages.py audit-release --zip $zip[0].FullName
      - name: Prove full-profile upload is refused
        shell: pwsh
        run: |
          @'
          import json, zipfile
          with zipfile.ZipFile("artifacts/portable/forbidden-full.zip", "w") as archive:
              archive.writestr("Component/package/tts-more-package.json", json.dumps({"schema_version": 2, "component": "tts-more", "package_profile": "full"}))
          '@ | python -
          python scripts\portable_packages.py audit-release --zip artifacts\portable\forbidden-full.zip
          if ($LASTEXITCODE -eq 0) { throw "full profile release audit unexpectedly passed" }
          Remove-Item artifacts\portable\forbidden-full.zip
      - uses: actions/upload-artifact@v7
        with:
          name: tts-more-windows-bootstrap
          if-no-files-found: error
          path: |
            artifacts/portable/bootstrap/*.zip
            artifacts/portable/bootstrap/*.sha256
            artifacts/portable/bootstrap/*.spdx.json
            artifacts/portable/bootstrap/*.licenses.json
            artifacts/portable/bootstrap/*.provenance.json
            artifacts/portable/bootstrap/*.acceptance.json

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: bootstrap
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: tts-more-windows-bootstrap
          path: release-assets
      - name: Publish bootstrap assets only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if find release-assets -type f -name '*-full.zip' | grep -q .; then
            echo "profile=full is prohibited from GitHub Releases" >&2
            exit 1
          fi
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
